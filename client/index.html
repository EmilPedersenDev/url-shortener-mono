<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
        font-size: 2rem;
      }

      .form-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      #urlInput {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      #urlInput:focus {
        outline: none;
        border-color: #667eea;
      }

      #shortenBtn {
        padding: 14px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      #shortenBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      #shortenBtn:active {
        transform: translateY(0);
      }

      #shortenBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .result {
        margin-top: 20px;
        padding: 20px;
        background: #f5f5f5;
        border-radius: 8px;
        display: none;
      }

      .result.show {
        display: block;
      }

      .result-label {
        font-size: 14px;
        color: #666;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .result-url {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .result-url a {
        color: #667eea;
        text-decoration: none;
        font-size: 16px;
        word-break: break-all;
        flex: 1;
      }

      .result-url a:hover {
        text-decoration: underline;
      }

      .copy-btn {
        padding: 8px 16px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .copy-btn:hover {
        background: #5568d3;
      }

      .copy-btn.copied {
        background: #4caf50;
      }

      .error {
        margin-top: 20px;
        padding: 12px;
        background: #ffebee;
        color: #c62828;
        border-radius: 8px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .loading {
        display: none;
        text-align: center;
        margin-top: 20px;
        color: #666;
      }

      .loading.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔗 URL Shortener</h1>
      <form id="urlForm">
        <div class="form-group">
          <input
            type="url"
            id="urlInput"
            placeholder="Enter your URL here..."
            required
          />
          <button type="submit" id="shortenBtn">Shorten</button>
        </div>
      </form>
      <div class="error" id="error"></div>
      <div class="loading" id="loading">Shortening URL...</div>
      <div class="result" id="result">
        <div class="result-label">Shortened URL:</div>
        <div class="result-url">
          <a href="#" id="shortUrl" target="_blank"></a>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
